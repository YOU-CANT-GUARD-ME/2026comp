<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{cursor: pointer;}
    .mom{width: 100px; border: 1px solid #000; display: flex;flex-direction: column; align-items: center;gap: 20px; position: relative; justify-content: center;}
    input{position: absolute; top: 0; width: 50px;}
    .drop{overflow: hidden;height: 0; transition: .4s;}
   /* 클릭하면 열림 */
#focus:focus ~ .drop {
  height: 100px;
}

/* 🔥 부모 영역 전체 기준으로 닫기 */
.mom:not(:hover) #focus {
  animation: mommy 0.01s forwards;
}

     @keyframes mommy {
      from{display: none;}
      to{display: block;}
     }
  </style>
</head>
<body>
  <div class="mom">
  <label for="focus">나는 라벨</label>
  <input type="text" id="focus" style="opacity: 0;">

  <div class="drop">
    <p>안녕</p>
    <p>나는 권제이</p>
  </div>
  </div>
</body>
</html>
